<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pass Repas - Gestion en Temps Réel</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
.glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
.tab-content { display: none; }
.active { display: block; }
</style>
</head>

<body class="bg-gray-100 min-h-screen font-sans">

<nav class="bg-white shadow-sm p-4 flex justify-between items-center">
<h1 class="text-xl font-bold text-orange-600">🍴 Pass Repas</h1>
<button onclick="toggleAdmin()" class="text-gray-400 hover:text-orange-500 text-xs">Accès Admin</button>
</nav>

<!-- CLIENT -->
<section id="client-view" class="tab-content active p-6 max-w-md mx-auto">
<div class="glass p-8 rounded-3xl shadow-xl text-center border border-orange-100">

<h2 class="text-2xl font-bold mb-6">Réserver mon repas</h2>

<select id="class-selector" class="w-full p-4 border rounded-xl mb-6"></select>

<button onclick="validateMeal()" class="w-full bg-orange-500 text-white py-5 rounded-xl text-xl font-bold">
VALIDER MON REPAS
</button>

<p id="status-msg" class="mt-4"></p>

</div>
</section>

<!-- ADMIN -->
<section id="admin-view" class="tab-content p-6 max-w-6xl mx-auto">

<h2 class="text-3xl font-bold mb-6">Dashboard Admin</h2>

<button onclick="exportToPDF()" class="bg-blue-600 text-white px-4 py-2 mb-6 rounded">
Exporter
</button>

<div id="charts-container" class="grid md:grid-cols-3 gap-6 mb-10"></div>

<div class="bg-white p-4 rounded mb-6">
<input id="new-class-name" placeholder="Nom classe" class="border p-2">
<input id="new-class-stock" type="number" placeholder="Stock" class="border p-2">
<button onclick="addClass()" class="bg-green-600 text-white px-4 py-2">Ajouter</button>
</div>

<table class="w-full bg-white rounded shadow">
<thead>
<tr>
<th class="p-3">Classe</th>
<th class="p-3">Pris</th>
<th class="p-3">Restant</th>
<th class="p-3">Action</th>
</tr>
</thead>
<tbody id="admin-table-body"></tbody>
</table>

<div class="mt-8 text-center">
<h3 class="font-bold mb-3">QR Code</h3>
<div id="qrcode"></div>
<button onclick="downloadQR()" class="text-orange-600 underline mt-3">
Télécharger PDF
</button>
</div>

</section>

<script>

// ================= DATA =================
let db = {
classes: {
"th1": { name: "Théologie 1", stock: 50, pris: 12 },
"ph1": { name: "Philosophie 1", stock: 60, pris: 10 }
}
};

let charts = {};

// ================= INIT =================
function init(){
renderClientView();
renderAdminView();
generateQR();
}

// ================= CLIENT =================
function renderClientView(){
const select = document.getElementById('class-selector');
select.innerHTML = "";

for(let id in db.classes){
select.innerHTML += `<option value="${id}">${db.classes[id].name}</option>`;
}
}

function validateMeal(){

const id = document.getElementById('class-selector').value;
const name = db.classes[id].name;
const msg = document.getElementById('status-msg');

Swal.fire({
title: "Confirmer ?",
text: name,
icon: "question",
showCancelButton: true,
confirmButtonColor: "#f97316"
}).then(result => {

if(!result.isConfirmed) return;

const today = new Date().toISOString().slice(0,10);

if(localStorage.getItem("scan") === today){
msg.innerText = "❌ Déjà utilisé aujourd'hui";
msg.className = "text-red-600";
return;
}

if(db.classes[id].pris < db.classes[id].stock){
db.classes[id].pris++;
localStorage.setItem("scan", today);

msg.innerText = "✅ Bon appétit !";
msg.className = "text-green-600";

renderAdminView();
}else{
msg.innerText = "⚠️ Stock épuisé";
msg.className = "text-orange-600";
}

});

}

// ================= ADMIN =================
function toggleAdmin(){
const code = prompt("Code admin :");

if(code === atob("YWRtaW5AQA==")){
document.getElementById('client-view').classList.remove('active');
document.getElementById('admin-view').classList.add('active');
}else{
alert("Accès refusé");
}
}

function renderAdminView(){

const tbody = document.getElementById('admin-table-body');
const chartsDiv = document.getElementById('charts-container');

tbody.innerHTML = "";
chartsDiv.innerHTML = "";

for(let id in db.classes){

let c = db.classes[id];
let rest = c.stock - c.pris;

tbody.innerHTML += `
<tr>
<td class="p-3">${c.name}</td>
<td class="p-3 text-orange-600">${c.pris}</td>
<td class="p-3">${rest}</td>
<td class="p-3">
<button onclick="deleteClass('${id}')" class="text-red-500">Supprimer</button>
</td>
</tr>
`;

chartsDiv.innerHTML += `
<div class="bg-white p-4 rounded">
<canvas id="chart-${id}"></canvas>
</div>
`;

}

setTimeout(()=>{
for(let id in db.classes){
createChart(id);
}
},100);

}

function createChart(id){
const c = db.classes[id];
const ctx = document.getElementById(`chart-${id}`);

if(charts[id]) charts[id].destroy();

charts[id] = new Chart(ctx,{
type:'doughnut',
data:{
labels:['Pris','Restant'],
datasets:[{
data:[c.pris, c.stock - c.pris],
backgroundColor:['#f97316','#e5e7eb']
}]
},
options:{plugins:{legend:{display:false}}}
});
}

function addClass(){
let name = document.getElementById('new-class-name').value;
let stock = parseInt(document.getElementById('new-class-stock').value);

if(name && stock){
let id = name.replace(/\s/g,'').toLowerCase();
db.classes[id] = {name, stock, pris:0};

renderClientView();
renderAdminView();
}
}

function deleteClass(id){
if(confirm("Supprimer ?")){
delete db.classes[id];
renderClientView();
renderAdminView();
}
}

// ================= QR =================
function generateQR(){
new QRCode(document.getElementById("qrcode"), {
text: window.location.href,
width: 128,
height: 128,
colorDark: "#f97316"
});
}

function downloadQR(){

const { jsPDF } = window.jspdf;
const img = document.querySelector("#qrcode img");

const pdf = new jsPDF();

pdf.setFontSize(18);
pdf.text("PASS REPAS", 105, 20, null, null, "center");

pdf.setFontSize(12);
pdf.text("Système de gestion des repas", 105, 30, null, null, "center");

pdf.addImage(img.src, 'PNG', 70, 40, 70, 70);

pdf.text(new Date().toLocaleDateString(), 105, 120, null, null, "center");

pdf.save("QR-Pass-Repas.pdf");

}

function exportToPDF(){
window.print();
}

// ================= START =================
window.onload = init;

</script>

</body>
</html>
